---
name: API Test

on:
  schedule:
    # 北京时间 0, 3, 6, 9, 12, 15, 18, 21点 (UTC 16, 19, 22, 1, 4, 7, 10, 13)
    - cron: "0 1,4,7,10,13,16,19,22 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "output/**"
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    if: >
      !contains(
        github.event.head_commit.message,
        '[skip ci]'
      )

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false

      - name: Install dependencies
        run: |
          cd test
          uv venv
          uv pip install aiohttp

      - name: Run API tests
        run: |
          cd test
          uv run python test_apis.py \
            -c 32 -v --clear --deprecated

      - name: Update README with API status
        run: |
          cd test
          uv run python ../.github/update_readme.py

      - name: Commit and push changes
        run: |
          git config --local user.email \
            "github-actions[bot]@users.noreply.github.com"
          git config --local user.name \
            "github-actions[bot]"
          git add -A
          git diff --staged --quiet || \
            git commit -m \
            "[skip ci] ci: update API test results \
            $(date -d '+8 hours' +'%Y-%m-%d %H:%M')"
          git push
